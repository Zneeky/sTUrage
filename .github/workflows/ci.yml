name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend:
    name: "Backend — lint, build, test"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=apps/backend

      - name: Lint
        run: npm run lint --workspace=apps/backend

      - name: Build
        run: npm run build --workspace=apps/backend

      - name: Push database schema
        run: npx prisma db push --schema=apps/backend/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db

      - name: Test
        run: npm test --workspace=apps/backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          JWT_SECRET: ci_test_secret_not_for_production
          RATE_LIMIT_WINDOW_MS: "900000"
          RATE_LIMIT_MAX_REQUESTS: "100"

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    name: "Frontend — lint, build, test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=apps/frontend

      - name: Build
        run: npm run build --workspace=apps/frontend

      - name: Test
        run: npm test --workspace=apps/frontend

  # ── Shared package ─────────────────────────────────────────
  shared:
    name: "Shared — build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=packages/shared
